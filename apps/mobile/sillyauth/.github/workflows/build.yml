name: Build SillyAuth

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Build AppBundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [android]
    steps:
      - uses: actions/checkout@v6

      - name: Download APK
        uses: actions/download-artifact@v7
        with:
          name: android-apk
          path: release

      - name: Get version
        run: echo "APP_VERSION=v$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.APP_VERSION }}+${{ github.run_number }}
          name: SillyAuth ${{ env.APP_VERSION }} (Build ${{ github.run_number }})
          body: |
            Auto-built from commit ${{ github.sha }}.
          files: release/*.apk
          draft: false
          prerelease: false
