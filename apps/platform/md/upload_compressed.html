<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传照片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f0ff;
        }

        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
        }

        #fileInput {
            display: none;
        }

        .preview-area {
            margin-top: 20px;
            display: none;
        }

        .preview-area img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .file-info {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
        }

        .upload-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .upload-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 等待生成页面样式 */
        .waiting-page {
            text-align: center;
            padding: 40px 20px;
        }

        .waiting-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .waiting-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .waiting-subtext {
            font-size: 14px;
            color: #666;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>
    <div class="container" id="uploadContainer">
        <h1>📸 上传照片</h1>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽照片到此处</div>
        </div>

        <input type="file" id="fileInput" accept="image/*">

        <div class="preview-area" id="previewArea">
            <img id="previewImage" alt="预览">
            <div class="file-info" id="fileInfo"></div>
        </div>

        <button class="upload-btn" id="uploadBtn" disabled>上传照片</button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="message success" id="successMessage"></div>
        <div class="message error" id="errorMessage"></div>
    </div>

    <!-- 等待生成页面 -->
    <div class="container waiting-page" id="waitingPage" style="display: none;">
        <div class="waiting-icon">🎨</div>
        <div class="waiting-text">AI正在为您生成照片<span class="loading-dots"></span></div>
        <div class="waiting-subtext">请稍候，大约需要10-20秒</div>
        <div class="progress-container" style="display: block; margin-top: 30px;">
            <div class="progress-bar">
                <div class="progress-fill" id="waitingProgress"></div>
            </div>
            <div class="progress-text" id="waitingText">正在生成...</div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const uploadContainer = document.getElementById('uploadContainer');
        const waitingPage = document.getElementById('waitingPage');
        const waitingProgress = document.getElementById('waitingProgress');
        const waitingText = document.getElementById('waitingText');

        let selectedFile = null;
        let sessionId = null;

        // 从URL获取sessionId（支持两种命名：session_id和sessionId）
        const urlParams = new URLSearchParams(window.location.search);
        sessionId = urlParams.get('session_id') || urlParams.get('sessionId');

        // 检测是否在Android WebView中
        const isAndroidWebView = /AndroidUploadCallback/.test(window.navigator.userAgent);

        console.log('URL search:', window.location.search);
        console.log('sessionId:', sessionId);
        console.log('isAndroidWebView:', isAndroidWebView);

        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                compressAndPreviewImage(file);
            }
        });

        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                compressAndPreviewImage(file);
            }
        });

        /**
         * 压缩图片并预览
         * @param {File} file - 原始图片文件
         */
        function compressAndPreviewImage(file) {
            const originalSizeMB = (file.size / (1024 * 1024)).toFixed(2);

            // 如果文件小于2MB，不压缩
            if (file.size < 2 * 1024 * 1024) {
                selectedFile = file;
                fileInfo.textContent = `📄 ${file.name} (${originalSizeMB} MB)`;
                fileInfo.style.color = '#28a745';
                displayPreview(file);
                return;
            }

            // 显示压缩中状态
            fileInfo.textContent = `⏳ ${file.name} (${originalSizeMB} MB) - 正在压缩...`;
            fileInfo.style.color = '#ff9800';

            const reader = new FileReader();
            reader.readAsDataURL(file);

            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;

                img.onload = () => {
                    // 创建Canvas进行压缩
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // 计算压缩后的尺寸（最大宽度1920px）
                    const maxWidth = 1920;
                    const maxHeight = 1920;
                    let width = img.width;
                    let height = img.height;

                    // 按比例缩放
                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;

                    // 绘制压缩后的图片
                    ctx.drawImage(img, 0, 0, width, height);

                    // 转换为Blob（质量0.85）
                    canvas.toBlob(
                        (blob) => {
                            if (blob) {
                                // 创建新文件，保留原始扩展名
                                const compressedFile = new File(
                                    [blob],
                                    file.name,
                                    { type: 'image/jpeg', lastModified: Date.now() }
                                );

                                const compressedSizeMB = (blob.size / (1024 * 1024)).toFixed(2);
                                const compressionRatio = ((1 - blob.size / file.size) * 100).toFixed(0);

                                selectedFile = compressedFile;
                                fileInfo.textContent = `📄 ${file.name} (${originalSizeMB} MB → ${compressedSizeMB} MB，压缩 ${compressionRatio}%)`;
                                fileInfo.style.color = '#28a745';

                                displayPreview(compressedFile);
                                hideMessages();
                            } else {
                                // 压缩失败，使用原始文件
                                selectedFile = file;
                                fileInfo.textContent = `📄 ${file.name} (${originalSizeMB} MB) - 压缩失败，将上传原图`;
                                fileInfo.style.color = '#dc3545';
                                displayPreview(file);
                                hideMessages();
                            }
                        },
                        'image/jpeg',
                        0.85
                    );
                };

                img.onerror = () => {
                    selectedFile = file;
                    fileInfo.textContent = `📄 ${file.name} (${originalSizeMB} MB) - 图片加载失败`;
                    fileInfo.style.color = '#dc3545';
                    displayPreview(file);
                    hideMessages();
                };
            };

            reader.onerror = () => {
                selectedFile = file;
                fileInfo.textContent = `📄 ${file.name} (${originalSizeMB} MB) - 文件读取失败`;
                fileInfo.style.color = '#dc3545';
                displayPreview(file);
                hideMessages();
            };
        }

        /**
         * 显示预览图片
         */
        function displayPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewArea.style.display = 'block';
                uploadBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // 上传按钮
        uploadBtn.addEventListener('click', uploadFile);

        async function uploadFile() {
            if (!selectedFile) {
                showError('请先选择要上传的照片');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('source', 'mobile');
            formData.append('module', 'style');

            if (sessionId) {
                formData.append('session_id', sessionId);
                console.log('添加session_id到上传请求:', sessionId);
            }

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<span class="spinner"></span>上传中...';
            progressContainer.style.display = 'block';
            hideMessages();

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressFill.style.width = percentComplete + '%';
                        progressText.textContent = percentComplete + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        if (response.code === 200) {
                            // 上传成功，切换到等待页面
                            if (isAndroidWebView) {
                                const data = response.data || {};
                                const resultJSON = JSON.stringify({
                                    url: data.url || '',
                                    filename: data.filename || selectedFile.name,
                                    file_id: data.file_id || '',
                                    timestamp: data.timestamp || Date.now()
                                });

                                try {
                                    window.AndroidUploadCallback.onUploadSuccess(resultJSON);
                                } catch (e) {
                                    console.error('调用Android回调失败:', e);
                                    showError('上传成功，但回调失败');
                                    resetUploadBtn();
                                }
                            } else {
                                // 非Android环境，显示等待页面并轮询生成结果
                                showWaitingPage();
                                if (sessionId) {
                                    pollGenerationResult(sessionId);
                                }
                            }
                        } else {
                            showError('上传失败：' + response.message);
                            resetUploadBtn();
                        }
                    } else {
                        showError('上传失败，请稍后重试');
                        resetUploadBtn();
                    }
                });

                xhr.addEventListener('error', () => {
                    showError('网络错误，请检查网络连接');
                    resetUploadBtn();
                });

                xhr.open('POST', '/application/upload/api');
                xhr.send(formData);

            } catch (error) {
                showError('上传失败：' + error.message);
                resetUploadBtn();
            }
        }

        function showWaitingPage() {
            uploadContainer.style.display = 'none';
            waitingPage.style.display = 'block';
        }

        // 轮询生成结果
        let pollCount = 0;
        const maxPolls = 40; // 最多轮询40次（约2分钟）

        function pollGenerationResult(sessionId) {
            console.log('开始轮询生成结果，sessionId:', sessionId);

            const pollInterval = setInterval(() => {
                pollCount++;

                // 更新进度条
                const progress = Math.min((pollCount / maxPolls) * 100, 95);
                waitingProgress.style.width = progress + '%';

                // 检查是否超时
                if (pollCount >= maxPolls) {
                    clearInterval(pollInterval);
                    waitingText.textContent = '生成超时，请返回重试';
                    waitingText.style.color = '#dc3545';
                    return;
                }

                // 查询生成结果
                fetch(`/application/generation/query?session_id=${sessionId}`)
                    .then(response => response.json())
                    .then(data => {
                        console.log('查询生成结果:', data);

                        if (data.code === 200 && data.data && data.data.result_url) {
                            // 生成完成
                            clearInterval(pollInterval);
                            waitingProgress.style.width = '100%';
                            waitingText.textContent = '生成完成！正在跳转...';

                            // 跳转到OSS图片URL
                            setTimeout(() => {
                                window.location.href = data.data.result_url;
                            }, 1000);
                        }
                    })
                    .catch(error => {
                        console.error('查询生成结果失败:', error);
                    });

            }, 3000); // 每3秒查询一次
        }

        function resetUploadBtn() {
            uploadBtn.disabled = false;
            uploadBtn.textContent = '上传照片';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideMessages() {
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
