[pytest]
# Pytest configuration for SillyMD payment security tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    security: marks tests as security tests

# Coverage options (if using pytest-cov)
# addopts = --cov=server/api --cov-report=html --cov-report=term

# Log options
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
