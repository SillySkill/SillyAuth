<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 挺傻的网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tech-blue.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局消息样式 */
        .auth-global-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .auth-global-message.success {
            border-left: 4px solid #10b981;
        }

        .auth-global-message.success i {
            color: #10b981;
        }

        .auth-global-message.error {
            border-left: 4px solid #ef4444;
        }

        .auth-global-message.error i {
            color: #ef4444;
        }

        .auth-global-message.fade-out {
            animation: slideOut 0.3s ease forwards;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="auth-page">
    <!-- 背景动画 -->
    <div class="auth-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="grid-pattern"></div>
    </div>

    <!-- 重置密码容器 -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <img src="silly/logo/logo.svg" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <i class="fas fa-cube" style="display:none;"></i>
                    <span>挺傻的网站</span>
                </a>
                <h1>设置新密码</h1>
                <p class="reset-instruction">请输入您的新密码</p>
            </div>

            <form class="auth-form" id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" name="newPassword" required
                               placeholder="••••••••"
                               minlength="8">
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认新密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                               placeholder="••••••••"
                               minlength="8">
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <span>重置密码</span>
                    <i class="fas fa-check"></i>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="back-to-login">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回登录</span>
                </a>
            </div>
        </div>

        <!-- 装饰元素 -->
        <div class="auth-decoration">
            <div class="tech-ring"></div>
            <div class="tech-ring ring-2"></div>
            <div class="floating-icons">
                <i class="fas fa-key"></i>
                <i class="fas fa-lock"></i>
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/mobile-menu.js"></script>
</body>
</html>
