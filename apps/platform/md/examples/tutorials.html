<!DOCTYPE html>
<html lang="zh-CN" data-theme="tech-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技术讲解 - SillyMD AI Skills 托管中心</title>
  <meta name="description" content="Claude Code、OpenClaw、Cursor、Windsurf 等 AI 工具的安装使用教程和讲解视频">
  <meta name="keywords" content="Claude Code, OpenClaw, Cursor, Windsurf, AI 工具, 编程助手, 教程">

  <!-- Open Graph -->
  <meta property="og:title" content="技术讲解 - SillyMD">
  <meta property="og:description" content="AI 工具安装使用教程">
  <meta property="og:image" id="ogImage" content="">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="../image/logo-1.png" type="image/png">
  <link rel="stylesheet" href="./css/responsive.css">

  <!-- Config.js -->
  <script type="module" src="./js/config.js"></script>
  <style>
    /* Base styles from index.html */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-white);
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    /* Hero Section */
    .tutorials-hero {
      background: linear-gradient(135deg, #0A1628 0%, #1A2842 50%, #0A1628 100%);
      padding: 120px 0 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .tutorials-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><path d="M0,600 L1200,600 L1200,400 Q600,600 0,400 Z" fill="rgba(0,102,255,0.05)"/></svg>') no-repeat center;
      background-size: cover;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(0, 102, 255, 0.2);
      border: 1px solid rgba(0, 102, 255, 0.4);
      border-radius: 20px;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .tutorials-hero h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #0066FF 0%, #00D4FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tutorials-hero p {
      font-size: 1.25rem;
      color: var(--text-light);
      max-width: 600px;
      margin: 0 auto 40px;
    }

    /* Categories Section */
    .categories-section {
      padding: 60px 0;
      background: var(--bg-dark-secondary);
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .category-card {
      background: var(--bg-dark);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .category-card:hover, .category-card.active {
      border-color: var(--primary);
      background: rgba(0, 102, 255, 0.05);
      transform: translateY(-4px);
    }
    .category-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .category-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .category-count {
      font-size: 0.9rem;
      color: var(--text-light);
    }

    /* Tutorials Grid */
    .tutorials-section {
      padding: 80px 0;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      max-width: 1400px;
      margin: 0 auto 40px;
      padding: 0 24px;
    }
    .section-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .section-subtitle {
      color: var(--text-light);
      font-size: 1rem;
    }
    .filter-tabs {
      display: flex;
      gap: 12px;
    }
    .filter-tab {
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s;
    }
    .filter-tab:hover, .filter-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .tutorials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 32px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Tutorial Card */
    .tutorial-card {
      background: var(--bg-dark-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tutorial-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary-light);
      box-shadow: 0 8px 32px rgba(0, 102, 255, 0.3);
    }
    .tutorial-thumbnail {
      position: relative;
      height: 200px;
      background: var(--gradient-dark);
      overflow: hidden;
    }
    .tutorial-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .tutorial-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 20px;
      font-size: 0.8rem;
      backdrop-filter: blur(10px);
    }
    .tutorial-badge.beginner { background: rgba(16, 185, 129, 0.9); }
    .tutorial-badge.intermediate { background: rgba(245, 158, 11, 0.9); }
    .tutorial-badge.advanced { background: rgba(239, 68, 68, 0.9); }

    .tutorial-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all 0.3s;
    }
    .tutorial-card:hover .tutorial-play {
      transform: translate(-50%, -50%) scale(1.1);
      background: var(--primary);
    }

    .tutorial-duration {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 4px 10px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .tutorial-content {
      padding: 24px;
    }
    .tutorial-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tutorial-category {
      padding: 4px 12px;
      background: rgba(0, 102, 255, 0.1);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--primary-light);
    }
    .tutorial-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .tutorial-description {
      color: var(--text-light);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tutorial-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
    }
    .tutorial-stats {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .tutorial-author {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tutorial-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    /* Featured Tutorial */
    .featured-tutorial {
      max-width: 1400px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }
    .featured-card {
      background: var(--bg-dark-secondary);
      border: 2px solid var(--primary);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .featured-video {
      position: relative;
      height: 100%;
      min-height: 400px;
      background: #000;
    }
    .featured-video video, .featured-video img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .featured-content {
      padding: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .featured-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(0, 102, 255, 0.2);
      border: 1px solid var(--primary);
      border-radius: 20px;
      margin-bottom: 24px;
      width: fit-content;
    }
    .featured-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .featured-description {
      color: var(--text-light);
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 32px;
    }

    /* Load More */
    .load-more {
      text-align: center;
      margin-top: 60px;
    }
    .btn-load-more {
      padding: 14px 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      color: var(--text-white);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-load-more:hover {
      background: var(--primary);
      border-color: var(--primary);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .tutorials-hero h1 { font-size: 2.5rem; }
      .featured-card { grid-template-columns: 1fr; }
      .featured-video { min-height: 300px; }
      .tutorials-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }

    @media (max-width: 768px) {
      .tutorials-hero h1 { font-size: 2rem; }
      .category-grid { grid-template-columns: repeat(2, 1fr); }
      .tutorials-grid { grid-template-columns: 1fr; }
      .featured-content { padding: 32px; }
      .section-header { flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- Navigation (include from existing) -->
  <nav class="navbar" id="navbar"></nav>

  <!-- Hero Section -->
  <section class="tutorials-hero">
    <div class="container">
      <div class="hero-badge">
        <i class="fas fa-star"></i>
        <span>精选 AI 工具教程</span>
      </div>
      <h1>掌握 AI 编程工具</h1>
      <p>从入门到精通，学习 Claude Code、OpenClaw、Cursor 等最新 AI 工具的使用技巧</p>
    </div>
  </section>

  <!-- Categories Section -->
  <section class="categories-section">
    <div class="category-grid">
      <div class="category-card active" data-category="all">
        <div class="category-icon">📚</div>
        <div class="category-name">全部教程</div>
        <div class="category-count">24+</div>
      </div>
      <div class="category-card" data-category="claude-code">
        <div class="category-icon">🤖</div>
        <div class="category-name">Claude Code</div>
        <div class="category-count">8</div>
      </div>
      <div class="category-card" data-category="openclaw">
        <div class="category-icon">🦞</div>
        <div class="category-name">OpenClaw</div>
        <div class="category-count">6</div>
      </div>
      <div class="category-card" data-category="cursor">
        <div class="category-icon">⚡</div>
        <div class="category-name">Cursor</div>
        <div class="category-count">5</div>
      </div>
      <div class="category-card" data-category="windsurf">
        <div class="category-icon">🌊</div>
        <div class="category-name">Windsurf</div>
        <div class="category-count">3</div>
      </div>
      <div class="category-card" data-category="copilot">
        <div class="category-icon">✈️</div>
        <div class="category-name">GitHub Copilot</div>
        <div class="category-count">4</div>
      </div>
    </div>
  </section>

  <!-- Featured Tutorial -->
  <section class="featured-tutorial" id="featuredTutorial">
    <!-- 动态加载精选教程 -->
  </section>

  <!-- Tutorials Section -->
  <section class="tutorials-section">
    <div class="section-header">
      <div>
        <h2 class="section-title">最新教程</h2>
        <p class="section-subtitle">持续更新的 AI 工具使用教程</p>
      </div>
      <div class="filter-tabs">
        <div class="filter-tab active" data-filter="all">全部</div>
        <div class="filter-tab" data-filter="installation">安装</div>
        <div class="filter-tab" data-filter="usage">使用</div>
        <div class="filter-tab" data-filter="tips">技巧</div>
        <div class="filter-tab" data-filter="advanced">进阶</div>
      </div>
    </div>

    <div class="tutorials-grid" id="tutorialsGrid">
      <!-- 动态加载教程列表 -->
    </div>

    <div class="load-more">
      <button class="btn-load-more" id="loadMore">
        <i class="fas fa-plus"></i> 加载更多教程
      </button>
    </div>
  </section>

  <!-- Footer (include from existing) -->
  <footer id="footer"></footer>

  <script>
    // 设置 Open Graph 图片 URL（动态生成）
    window.addEventListener('DOMContentLoaded', function() {
      const ogImage = document.getElementById('ogImage');
      if (ogImage && typeof window.getFileProxyUrl === 'function') {
        ogImage.content = window.getFileProxyUrl('og-tutorials.jpg');
      } else if (ogImage) {
        // Fallback
        ogImage.content = 'https://jc-st.oss-cn-shanghai.aliyuncs.com/sillymd/og-tutorials.jpg';
      }
    });

    // 动态加载导航和页脚
    fetch('./index.html')
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        document.getElementById('navbar').innerHTML = doc.querySelector('.navbar').outerHTML;
        document.getElementById('footer').innerHTML = doc.querySelector('.footer').outerHTML;
      });

    // API 配置
    const API_BASE = 'http://47.96.133.238:8000/api';

    // 加载教程数据
    async function loadTutorials(category = 'all', filter = 'all') {
      try {
        const response = await fetch(`${API_BASE}/tutorials?category=${category}&filter=${filter}`);
        const data = await response.json();

        if (data.success) {
          renderTutorials(data.data);
        }
      } catch (error) {
        console.error('加载教程失败:', error);
        // 使用静态数据作为fallback
        renderStaticTutorials();
      }
    }

    // 渲染教程列表
    function renderTutorials(tutorials) {
      const grid = document.getElementById('tutorialsGrid');
      grid.innerHTML = tutorials.map(tutorial => `
        <div class="tutorial-card" onclick="openTutorial('${tutorial.slug}')">
          <div class="tutorial-thumbnail">
            <img src="${tutorial.thumbnail}" alt="${tutorial.title_zh_CN}">
            <span class="tutorial-badge ${tutorial.difficulty}">${getDifficultyText(tutorial.difficulty)}</span>
            <div class="tutorial-play"><i class="fas fa-play"></i></div>
            <span class="tutorial-duration">${formatDuration(tutorial.video_duration)}</span>
          </div>
          <div class="tutorial-content">
            <div class="tutorial-meta">
              <span class="tutorial-category">${getCategoryText(tutorial.category)}</span>
            </div>
            <h3 class="tutorial-title">${tutorial.title_zh_CN}</h3>
            <p class="tutorial-description">${tutorial.description_zh_CN}</p>
            <div class="tutorial-footer">
              <div class="tutorial-stats">
                <span><i class="fas fa-eye"></i> ${formatNumber(tutorial.view_count)}</span>
                <span><i class="fas fa-heart"></i> ${tutorial.like_count}</span>
              </div>
              <div class="tutorial-author">
                <img src="${tutorial.author_avatar}" class="tutorial-avatar" alt="${tutorial.author_name}">
                <span>${tutorial.author_name}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 静态数据（fallback）
    function renderStaticTutorials() {
      // 使用 getFileProxyUrl 生成 OSS 资源 URL
      const getFileUrl = (path) => {
        if (typeof window.getFileProxyUrl === 'function') {
          return window.getFileProxyUrl(path);
        }
        // Fallback: 如果 config.js 未加载，使用原始 OSS URL
        return `https://jc-st.oss-cn-shanghai.aliyuncs.com/sillymd/${path}`;
      };

      const tutorials = [
        {
          slug: 'claude-code-getting-started',
          thumbnail: getFileUrl('tutorials/claude-code-thumb.jpg'),
          difficulty: 'beginner',
          video_duration: 1800,
          category: 'claude-code',
          title_zh_CN: 'Claude Code 入门教程：从零开始学习 AI 编程助手',
          description_zh_CN: '学习如何安装和配置 Claude Code，掌握基本的代码生成、重构和调试功能',
          view_count: 12500,
          like_count: 856,
          author_avatar: 'image/avatars/default.svg',
          author_name: 'Admin'
        },
        {
          slug: 'openclaw-advanced',
          thumbnail: getFileUrl('tutorials/openclaw-thumb.jpg'),
          difficulty: 'advanced',
          video_duration: 2400,
          category: 'openclaw',
          title_zh_CN: 'OpenClaw 高级技巧：自定义 AI 模型和插件开发',
          description_zh_CN: '深入了解 OpenClaw 的插件系统，学习如何开发自定义 AI 模型集成',
          view_count: 8900,
          like_count: 624,
          author_avatar: 'image/avatars/default.svg',
          author_name: 'Admin'
        }
      ];
      renderTutorials(tutorials);
    }

    // 辅助函数
    function getDifficultyText(difficulty) {
      const map = { beginner: '入门', intermediate: '中级', advanced: '高级' };
      return map[difficulty] || difficulty;
    }

    function getCategoryText(category) {
      const map = {
        'claude-code': 'Claude Code',
        'openclaw': 'OpenClaw',
        'cursor': 'Cursor',
        'windsurf': 'Windsurf',
        'copilot': 'Copilot'
      };
      return map[category] || category;
    }

    function formatDuration(seconds) {
      const minutes = Math.floor(seconds / 60);
      return `${minutes}:${(seconds % 60).toString().padStart(2, '0')}`;
    }

    function formatNumber(num) {
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'k';
      }
      return num.toString();
    }

    function openTutorial(slug) {
      window.location.href = `/tutorials/${slug}.html`;
    }

    // 分类点击事件
    document.querySelectorAll('.category-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        loadTutorials(card.dataset.category);
      });
    });

    // 筛选标签点击事件
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadTutorials('all', tab.dataset.filter);
      });
    });

    // 加载更多
    document.getElementById('loadMore').addEventListener('click', () => {
      // TODO: 实现分页加载
      alert('加载更多功能开发中...');
    });

    // 初始化
    loadTutorials();
  </script>
</body>
</html>
