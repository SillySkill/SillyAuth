  <style>

    /* Stats Section */
    .stats-bar {
      display: grid;

      gap: 24px;

    .stat-card {

    .stat-value {
      font-size: 2rem;
      font-weight: 700;

      background: var(--gradient-primary);

      -webkit-text-fill-color: transparent;
    }
    .stat-label {

    /* Categories Section */
    .categories-section {

    .category-grid {
      display: grid;

    /* Downloads Section */
    .downloads-section {

    }
    .section-header {

    .download-links {

    .download-link {

      justify-content: space-between;

    .link-info {

    }
    .link-action {

    }
    .mirror-badge {
      padding: 2px 8px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 4px;

    .download-footer {
      padding: 16px 24px;

      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .download-stats {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* Platform Tabs */
    .platform-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      max-width: 1400px;
      margin: 0 auto 24px;
      padding: 0 24px;
    }
    .platform-tab {
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      color: var(--text-light);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .platform-tab:hover, .platform-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .downloads-hero h1 { font-size: 2.5rem; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .downloads-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .downloads-hero h1 { font-size: 2rem; }

      .category-grid { grid-template-columns: repeat(3, 1fr); }
      .section-header { flex-direction: column; gap: 16px; align-items: flex-start; }
      .search-box { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Platform Filter -->
  <div class="platform-tabs">

  <!-- Downloads Section -->
  <section class="downloads-section">
    <div class="section-header">
      <div>
        <h2 class="section-title">热门资源</h2>
        <p class="section-subtitle">最常用的开发工具和框架</p>
      </div>
      <div class="search-box">
        <input type="text" placeholder="搜索资源...">

    <div class="downloads-grid" id="downloadsGrid">
      <!-- 动态加载资源列表 -->
    </div>
  </section>

  <!-- Footer -->
  <footer id="footer"></footer>

  <script>
    // 设置 Open Graph 图片 URL（动态生成）
    window.addEventListener('DOMContentLoaded', function() {
      const ogImage = document.getElementById('ogImage');
      if (ogImage && typeof window.getFileProxyUrl === 'function') {
        ogImage.content = window.getFileProxyUrl('og-downloads.jpg');
      } else if (ogImage) {
        // Fallback
        ogImage.content = 'https://jc-st.oss-cn-shanghai.aliyuncs.com/sillymd/og-downloads.jpg';
      }
    });

    // 动态加载导航和页脚
    fetch('./index.html')
      .then(response => response.text())
      .then(html => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        document.getElementById('navbar').innerHTML = doc.querySelector('.navbar').outerHTML;
        document.getElementById('footer').innerHTML = doc.querySelector('.footer').outerHTML;
      });

    // API 配置
    const API_BASE = 'http://47.96.133.238:8000/api';

    // 加载资源数据
    async function loadDownloads(category = 'all', platform = 'all') {
      try {
        const response = await fetch(`${API_BASE}/downloads?category=${category}&platform=${platform}`);
        const data = await response.json();

        if (data.success) {
          renderDownloads(data.data);
        }
      } catch (error) {
        console.error('加载资源失败:', error);
        // 使用静态数据作为fallback
        renderStaticDownloads();
      }
    }

    // 渲染资源列表
    function renderDownloads(downloads) {
      const grid = document.getElementById('downloadsGrid');
      grid.innerHTML = downloads.map(download => `
        <div class="download-card">
          <div class="download-header">
            <div class="download-icon">${getCategoryIcon(download.category)}</div>
            <div class="download-info">
              <h3 class="download-title">${download.title_zh_CN}</h3>
              <div class="download-version">
                版本 ${download.version}
                ${download.is_official ? '<span class="official-badge">官方</span>' : ''}
              </div>
              <div class="download-meta">
                <span><i class="fas fa-laptop"></i> ${getPlatformText(download.platform)}</span>
                <span><i class="fas fa-file"></i> ${download.file_type}</span>
              </div>
            </div>
          </div>
          <div class="download-body">
            <p class="download-description">${download.description_zh_CN}</p>
            <div class="download-links">
              <a href="${download.file_url}" class="download-link download-link-primary" download>
                <div class="link-info">
                  <i class="fas fa-cloud-download-alt link-icon"></i>
                  <div>
                    <div class="link-name">直接下载</div>
                    <div class="link-size">${formatFileSize(download.file_size)}</div>
                  </div>
                </div>
                <div class="link-action">
                  <i class="fas fa-download"></i>
                  <span>下载</span>
                </div>
              </a>
              ${download.mirror_url_1 ? `
              <a href="${download.mirror_url_1}" class="download-link" target="_blank">
                <div class="link-info">
                  <i class="fas fa-server link-icon"></i>
                  <div>
                    <div class="link-name">阿里云镜像</div>
                    <div class="link-size">${getMirrorName(download.mirror_url_names, 'mirror_url_1')}</div>
                  </div>
                </div>
                <div class="link-action">
                  <span class="mirror-badge">镜像</span>
                  <i class="fas fa-external-link-alt"></i>
                </div>
              </a>
              ` : ''}
              ${download.github_url ? `
              <a href="${download.github_url}" class="download-link" target="_blank">
                <div class="link-info">
                  <i class="fab fa-github link-icon"></i>
                  <div class="link-name">GitHub 仓库</div>
                </div>
                <div class="link-action">
                  <i class="fas fa-external-link-alt"></i>
                </div>
              </a>
              ` : ''}
            </div>
          </div>
          <div class="download-footer">
            <div class="download-stats">
              <span><i class="fas fa-download"></i> ${formatNumber(download.download_count)}</span>
              <span><i class="fas fa-eye"></i> ${formatNumber(download.view_count)}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 静态数据（fallback）
    function renderStaticDownloads() {
      // 使用 getFileProxyUrl 生成 OSS 资源 URL
      const getFileUrl = (path) => {
        if (typeof window.getFileProxyUrl === 'function') {
          return window.getFileProxyUrl(path);
        }
        // Fallback: 如果 config.js 未加载，使用原始 OSS URL
        return `https://jc-st.oss-cn-shanghai.aliyuncs.com/sillymd/${path}`;
      };

      const downloads = [
        {
          category: 'wsl',
          title_zh_CN: 'WSL2 for Windows',
          version: '2.0.0',
          is_official: true,
          platform: 'windows',
          file_type: 'msi',
          description_zh_CN: '适用于 Windows 10/11 的 WSL2 安装包，支持最新的 Linux 内核',
          file_url: getFileUrl('downloads/wsl.2.0.0.x64.msi'),
          file_size: 256000000,
          mirror_url_1: 'https://mirrors.aliyun.com/wsl/wsl.2.0.0.x64.msi',
          mirror_url_names: '{"mirror_url_1": "阿里云"}',
          github_url: 'https://github.com/microsoft/WSL',
          download_count: 125000,
          view_count: 250000
        },
        {
          category: 'python',
          title_zh_CN: 'Python 3.12.1',
          version: '3.12.1',
          is_official: true,
          platform: 'windows',
          file_type: 'exe',
          description_zh_CN: 'Python 3.12.1 Windows x64 安装包，包含 pip 和标准库',
          file_url: getFileUrl('downloads/python-3.12.1-amd64.exe'),
          file_size: 25600000,
          mirror_url_1: 'https://mirrors.aliyun.com/python/3.12.1/python-3.12.1-amd64.exe',
          mirror_url_names: '{"mirror_url_1": "阿里云"}',
          github_url: 'https://www.python.org/downloads/',
          download_count: 89000,
          view_count: 156000
        }
      ];
      renderDownloads(downloads);
    }

    // 辅助函数
    function getCategoryIcon(category) {
      const icons = {
        'wsl': '🐧',
        'python': '🐍',
        'nodejs': '💚',
        'git': '📂',
        'vscode': '💻',
        'docker': '🐳',
        'tools': '🛠️'
      };
      return icons[category] || '📦';
    }

    function getPlatformText(platform) {
      const map = { windows: 'Windows', macos: 'macOS', linux: 'Linux', all: '全平台' };
      return map[platform] || platform;
    }

    function formatFileSize(bytes) {
      if (bytes >= 1073741824) {
        return (bytes / 1073741824).toFixed(2) + ' GB';
      } else if (bytes >= 1048576) {
        return (bytes / 1048576).toFixed(2) + ' MB';
      } else {
        return bytes + ' B';
      }
    }

    function formatNumber(num) {
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
      } else if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
      }
      return num.toString();
    }

    function getMirrorName(namesJson, key) {
      try {
        const names = JSON.parse(namesJson || '{}');
        return names[key] || '镜像';
      } catch {
        return '镜像';
      }
    }

    // 分类点击事件
    document.querySelectorAll('.category-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        loadDownloads(card.dataset.category, getCurrentPlatform());
      });
    });

    // 平台筛选
    document.querySelectorAll('.platform-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        loadDownloads(getCurrentCategory(), tab.dataset.platform);
      });
    });

    function getCurrentCategory() {
      const active = document.querySelector('.category-card.active');
      return active ? active.dataset.category : 'all';
    }

    function getCurrentPlatform() {
      const active = document.querySelector('.platform-tab.active');
      return active ? active.dataset.platform : 'all';
    }

    // 初始化
