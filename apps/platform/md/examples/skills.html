<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>探索 Skills - 挺傻的</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="../logo/0128/挺傻的-圆.png" type="image/png">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="logo">
        <img src="../logo/0128/挺傻的.png" alt="挺傻的" style="height: 40px; width: auto;">
      </a>
      
      <ul class="nav-links">
        <li><a href="skills.html" class="nav-link active">探索 Skills</a></li>
        <li><a href="marketplace.html" class="nav-link">供应商市场</a></li>
        <li><a href="teams.html" class="nav-link">团队协作</a></li>
        <li><a href="docs.html" class="nav-link">文档</a></li>
      </ul>
      
      <div class="nav-actions">
        <a href="search.html" class="btn btn-ghost"><i class="fas fa-search"></i></a>
        <a href="login.html" class="btn btn-secondary btn-sm">登录</a>
        <a href="register.html" class="btn btn-primary btn-sm">注册</a>
      </div>
    </div>
  </nav>

  <!-- 页面内容 -->
  <div style="padding-top: 72px;">
    <!-- 搜索头部 -->
    <section style="padding: 60px 0; background: linear-gradient(180deg, #0A1628 0%, #111D2E 100%);">
      <div class="container">
        <h1 style="font-size: 2.5rem; font-weight: 700; text-align: center; margin-bottom: 16px;">
          探索 <span class="text-gradient">Skills</span>
        </h1>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 40px;">
          发现优质 AI Skills，提升你的工作效率
        </p>
        
        <div class="search-box" style="max-width: 700px;">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="搜索 Skills、行业、应用场景...">
        </div>
        
        <!-- 热门搜索 -->
        <div style="text-align: center; margin-top: 24px;">
          <span style="color: var(--text-light); font-size: 0.9rem;">热门搜索：</span>
          <a href="#" class="tag" onclick="quickSearch('数据分析'); return false;" style="margin-left: 8px;">数据分析</a>
          <a href="#" class="tag" onclick="quickSearch('自动化'); return false;">自动化</a>
          <a href="#" class="tag" onclick="quickSearch('代码审查'); return false;">代码审查</a>
          <a href="#" class="tag" onclick="quickSearch('交易机器人'); return false;">交易机器人</a>
          <a href="#" class="tag" onclick="quickSearch('文档生成'); return false;">文档生成</a>
        </div>
      </div>
    </section>

    <!-- 筛选和列表 -->
    <section style="padding: 40px 0;">
      <div class="container">
        <div style="display: grid; grid-template-columns: 280px 1fr; gap: 32px;">
          <!-- 侧边筛选栏 -->
          <aside style="background: var(--bg-dark-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 24px; height: fit-content; position: sticky; top: 90px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
              <h3 style="font-size: 1.1rem; font-weight: 600;">筛选条件</h3>
              <a href="#" onclick="resetFilters(); return false;" style="font-size: 0.85rem; color: var(--primary-light);">重置</a>
            </div>
            
            <!-- 动态筛选器 -->
            <div data-demo-filters>
              <!-- 由 demo-loader.js 渲染 -->
            </div>
          </aside>
          
          <!-- 列表区域 -->
          <div>
            <!-- 排序工具栏 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 16px 20px; background: var(--bg-dark-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-md);">
              <span style="color: var(--text-light); font-size: 0.9rem;" data-demo-count>
                正在加载...
              </span>
              <div style="display: flex; align-items: center; gap: 12px;">
                <span style="color: var(--text-light); font-size: 0.9rem;">排序：</span>
                <select id="sortSelect" onchange="handleSort(this.value)" style="padding: 8px 12px; background: var(--bg-dark-tertiary); border: 1px solid var(--border-light); border-radius: var(--radius-sm); color: var(--text-white); font-size: 0.9rem;">
                  <option value="default">综合排序</option>
                  <option value="newest">最新发布</option>
                  <option value="downloads">最多下载</option>
                  <option value="price-asc">价格从低到高</option>
                  <option value="price-desc">价格从高到低</option>
                </select>
              </div>
            </div>
            
            <!-- Skills 网格 -->
            <div class="grid grid-3" style="margin-bottom: 32px;" data-demo-skills>
              <!-- 由 demo-loader.js 渲染 -->
            </div>
            
            <!-- 分页 -->
            <div style="display: flex; justify-content: center; gap: 8px;" data-demo-pagination>
              <!-- 由 demo-loader.js 渲染 -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <img src="../logo/0128/挺傻的-白.png" alt="挺傻的" style="height: 36px; margin-bottom: 16px;">
          <p class="footer-desc">承认自己有时候挺傻的，这是智慧的开始。</p>
        </div>
        
        <div>
          <h4 class="footer-title">产品</h4>
          <ul class="footer-links">
            <li class="footer-link"><a href="skills.html">探索 Skills</a></li>
            <li class="footer-link"><a href="marketplace.html">供应商市场</a></li>
            <li class="footer-link"><a href="teams.html">团队协作</a></li>
          </ul>
        </div>
        
        <div>
          <h4 class="footer-title">开发者</h4>
          <ul class="footer-links">
            <li class="footer-link"><a href="docs.html">文档</a></li>
            <li class="footer-link"><a href="api.html">API</a></li>
            <li class="footer-link"><a href="sdk.html">SDK</a></li>
          </ul>
        </div>
        
        <div>
          <h4 class="footer-title">支持</h4>
          <ul class="footer-links">
            <li class="footer-link"><a href="help.html">帮助中心</a></li>
            <li class="footer-link"><a href="contact.html">联系我们</a></li>
          </ul>
        </div>
      </div>
      
      <div class="footer-bottom">
        <p>&copy; 2026 挺傻的. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Skills API 客户端 -->
  <script src="js/skills-api.js"></script>
  <script src="js/mobile-menu.js"></script>
  <script>
    // 搜索功能
    function quickSearch(keyword) {
      document.getElementById('searchInput').value = keyword;
      if (typeof SkillsAPI !== 'undefined') {
        SkillsAPI.search(keyword);
      }
    }

    // 搜索输入框实时搜索（带防抖）
    let searchTimeout;
    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', function(e) {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => {
            if (typeof SkillsAPI !== 'undefined') {
              SkillsAPI.search(e.target.value);
            }
          }, 500);
        });
      }
    });

    // 重置筛选
    function resetFilters() {
      if (typeof SkillsAPI !== 'undefined') {
        SkillsAPI.resetFilters();
      }
    }

    // 排序处理
    function handleSort(sortType) {
      if (typeof SkillsAPI !== 'undefined') {
        SkillsAPI.handleSort(sortType);
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
      if (typeof SkillsAPI !== 'undefined') {
        await SkillsAPI.init({
          apiBaseUrl: 'http://47.96.133.238:8000'
        });
      }
    });
  </script>
</body>
</html>
