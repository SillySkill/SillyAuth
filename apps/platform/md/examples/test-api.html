<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API连接测试 - SillyMD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .test-section {
            margin-bottom: 30px;
        }

        .test-title {
            font-weight: 600;
            color: #444;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .status-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            color: #666;
            font-size: 14px;
        }

        .status-value {
            font-weight: 600;
            color: #333;
        }

        .status-value.success {
            color: #28a745;
        }

        .status-value.error {
            color: #dc3545;
        }

        .status-value.warning {
            color: #ffc107;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: #6c757d;
        }

        .console-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .console-line {
            margin-bottom: 5px;
        }

        .console-line.error {
            color: #f48771;
        }

        .console-line.success {
            color: #89d185;
        }

        .console-line.info {
            color: #4fc1ff;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge.success {
            background: #d4edda;
            color: #155724;
        }

        .badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .badge.warning {
            background: #fff3cd;
            color: #856404;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .card-title {
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .card-value {
            color: #333;
            font-size: 24px;
            font-weight: 700;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API连接诊断工具</h1>
        <p class="subtitle">自动检测并测试API连接状态</p>

        <!-- 环境信息 -->
        <div class="test-section">
            <div class="test-title">📊 环境信息</div>
            <div class="grid">
                <div class="card">
                    <div class="card-title">当前环境</div>
                    <div class="card-value" id="env">检测中...</div>
                </div>
                <div class="card">
                    <div class="card-title">API地址</div>
                    <div class="card-value" id="apiUrl" style="font-size: 16px;">检测中...</div>
                </div>
                <div class="card">
                    <div class="card-title">主机名</div>
                    <div class="card-value" id="hostname" style="font-size: 16px;">检测中...</div>
                </div>
            </div>
        </div>

        <!-- API测试 -->
        <div class="test-section">
            <div class="test-title">🧪 API连接测试</div>
            <div class="status-box">
                <div class="status-item">
                    <span class="status-label">配置文件加载</span>
                    <span class="status-value" id="configStatus">检测中...</span>
                </div>
                <div class="status-item">
                    <span class="status-label">API健康检查</span>
                    <span class="status-value" id="healthStatus">等待测试</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Skills API测试</span>
                    <span class="status-value" id="skillsStatus">等待测试</span>
                </div>
                <div class="status-item">
                    <span class="status-label">数据库连接</span>
                    <span class="status-value" id="dbStatus">等待测试</span>
                </div>
            </div>

            <button class="button" onclick="runAllTests()">🚀 运行全部测试</button>
            <button class="button secondary" onclick="testHealth()">🏥 健康检查</button>
            <button class="button secondary" onclick="testSkills()">📦 Skills API</button>
            <button class="button secondary" onclick="clearConsole()">🗑️ 清空日志</button>
        </div>

        <!-- 测试进度 -->
        <div class="test-section">
            <div class="test-title">📈 测试进度</div>
            <div class="progress">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
            <p style="margin-top: 10px; color: #666; font-size: 14px;">
                已完成: <span id="progressText">0</span> / 4 项测试
            </p>
        </div>

        <!-- 控制台输出 -->
        <div class="test-section">
            <div class="test-title">💻 测试日志</div>
            <div class="console-output" id="console">
                <div class="console-line info">[INFO] 等待测试开始...</div>
            </div>
        </div>

        <!-- 快速链接 -->
        <div class="test-section">
            <div class="test-title">🔗 快速链接</div>
            <button class="button" onclick="window.open('login.html', '_blank')">🔑 登录页面</button>
            <button class="button" onclick="window.open('index.html', '_blank')">🏠 首页</button>
            <button class="button secondary" onclick="window.open('http://47.96.133.238:8000/docs', '_blank')">📚 API文档</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let completedTests = 0;
        const totalTests = 4;

        // 更新进度条
        function updateProgress() {
            completedTests++;
            const percentage = (completedTests / totalTests) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressText').textContent = completedTests;
        }

        // 日志输出
        function log(message, type = 'info') {
            const console = document.getElementById('console');
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${message}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        // 清空日志
        function clearConsole() {
            document.getElementById('console').innerHTML = '<div class="console-line info">[INFO] 日志已清空</div>';
            completedTests = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = '0';
            resetStatus();
        }

        // 重置状态
        function resetStatus() {
            document.getElementById('healthStatus').innerHTML = '等待测试';
            document.getElementById('skillsStatus').innerHTML = '等待测试';
            document.getElementById('dbStatus').innerHTML = '等待测试';
        }

        // 更新状态显示
        function updateStatus(elementId, status, text) {
            const element = document.getElementById(elementId);
            element.className = `status-value ${status}`;
            element.innerHTML = text + (status === 'success' ? ' ✓' : status === 'error' ? ' ✗' : '');
        }

        // 显示环境信息
        function showEnvironment() {
            const hostname = window.location.hostname;
            let env = 'Unknown';

            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                env = 'Development';
            } else if (hostname.includes('staging')) {
                env = 'Staging';
            } else {
                env = 'Production';
            }

            document.getElementById('env').textContent = env;
            document.getElementById('hostname').textContent = hostname;

            if (typeof API_CONFIG !== 'undefined') {
                document.getElementById('apiUrl').textContent = API_CONFIG.API_BASE_URL;
                document.getElementById('configStatus').innerHTML = '<span class="badge success">已加载</span>';
                log(`配置文件加载成功: ${API_CONFIG.API_BASE_URL}`, 'success');
            } else {
                document.getElementById('apiUrl').textContent = '未配置';
                document.getElementById('configStatus').innerHTML = '<span class="badge error">未加载</span>';
                log('配置文件未加载！', 'error');
            }
        }

        // 测试健康检查
        async function testHealth() {
            log('开始健康检查测试...', 'info');
            updateStatus('healthStatus', 'warning', '测试中...');

            try {
                const response = await fetch('http://47.96.133.238:8000/api/health');
                const data = await response.json();

                if (response.ok && data.status === 'healthy') {
                    updateStatus('healthStatus', 'success', '正常');
                    updateStatus('dbStatus', 'success', '已连接');
                    log('✓ 健康检查通过', 'success');
                    log(`✓ 数据库状态: ${data.database}`, 'success');
                    updateProgress();
                    updateProgress();
                } else {
                    throw new Error('API返回异常状态');
                }
            } catch (error) {
                updateStatus('healthStatus', 'error', '失败');
                log(`✗ 健康检查失败: ${error.message}`, 'error');
            }
        }

        // 测试Skills API
        async function testSkills() {
            log('开始Skills API测试...', 'info');
            updateStatus('skillsStatus', 'warning', '测试中...');

            try {
                const response = await fetch('http://47.96.133.238:8000/api/skills?limit=1');
                const data = await response.json();

                if (response.ok && Array.isArray(data) && data.length > 0) {
                    updateStatus('skillsStatus', 'success', '正常');
                    log(`✓ Skills API正常，返回 ${data.length} 条数据`, 'success');
                    log(`示例: ${data[0].name}`, 'info');
                    updateProgress();
                } else {
                    throw new Error('API返回数据格式错误');
                }
            } catch (error) {
                updateStatus('skillsStatus', 'error', '失败');
                log(`✗ Skills API测试失败: ${error.message}`, 'error');
            }
        }

        // 运行所有测试
        async function runAllTests() {
            log('========================================', 'info');
            log('开始运行完整测试套件...', 'info');
            log('========================================', 'info');

            completedTests = 0;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = '0';
            resetStatus();

            // 配置已加载计数
            if (typeof API_CONFIG !== 'undefined') {
                updateProgress();
            }

            // 依次运行测试
            await testHealth();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testSkills();

            log('========================================', 'info');
            log('测试套件执行完成！', 'info');
            log('========================================', 'info');
        }

        // 页面加载时显示环境信息
        window.addEventListener('DOMContentLoaded', () => {
            showEnvironment();
            log('页面加载完成', 'success');
            log('当前主机: ' + window.location.hostname, 'info');
        });
    </script>
</body>
</html>
