<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析 - 挺傻的网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tech-blue.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Config.js -->
    <script type="module" src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">
                <img src="silly/logo/logo.svg" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <i class="fas fa-cube" style="display:none;"></i>
                <span>挺傻的网站</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>概览</span></a>
            <a href="analytics.html" class="nav-item active"><i class="fas fa-chart-line"></i><span>分析</span></a>
            <a href="projects.html" class="nav-item"><i class="fas fa-folder"></i><span>项目</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>消息</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>设置</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-info"><span class="user-name">Test User</span><span class="user-role">Free Plan</span></div>
                <button class="btn-icon" onclick="auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="搜索..."></div>
            <div class="top-actions"><button class="btn-icon"><i class="fas fa-bell"></i></button></div>
        </header>

        <div class="page-content">
            <div class="page-header"><h1>数据分析</h1><p>查看您的网站流量和用户行为数据</p></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-header"><div class="stat-icon"><i class="fas fa-users"></i></div><span class="stat-change">+12.5%</span></div><div class="stat-value">24,521</div><div class="stat-label">总访问量</div></div>
                <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #34d399);"><i class="fas fa-eye"></i></div><span class="stat-change">+8.2%</span></div><div class="stat-value">18,302</div><div class="stat-label">页面浏览量</div></div>
                <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);"><i class="fas fa-clock"></i></div><span class="stat-change">+5.1%</span></div><div class="stat-value">4m 32s</div><div class="stat-label">平均停留时间</div></div>
                <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background: linear-gradient(135deg, #ef4444, #f87171);"><i class="fas fa-chart-pie"></i></div><span class="stat-change negative">-2.3%</span></div><div class="stat-value">42.8%</div><div class="stat-label">跳出率</div></div>
            </div>
        </div>
    </main>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
