<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - 挺傻的网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tech-blue.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link id="theme-css" rel="stylesheet" href="css/themes/tech-blue.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .toast-notification { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 14px 24px; border-radius: 12px; display: flex; align-items: center; gap: 12px; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 10000; }
        .toast-notification.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">
                <img src="" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <i class="fas fa-cube" style="display:none;"></i>
                <span>挺傻的网站</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>概览</span></a>
            <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i><span>分析</span></a>
            <a href="projects.html" class="nav-item"><i class="fas fa-folder"></i><span>项目</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>消息</span></a>
            <a href="settings.html" class="nav-item active"><i class="fas fa-cog"></i><span>设置</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-info"><span class="user-name">Test User</span><span class="user-role">Free Plan</span></div>
                <button class="btn-icon" onclick="auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="搜索..."></div>
            <div class="top-actions">
                <div class="language-selector">
                    <button class="lang-btn" id="langBtn"><i class="fas fa-globe"></i><span>中文</span></button>
                    <div class="lang-dropdown">
                        <a href="#" data-lang="zh-CN">中文</a>
                        <a href="#" data-lang="en">English</a>
                        <a href="#" data-lang="ja">日本語</a>
                        <a href="#" data-lang="ko">한국어</a>
                    </div>
                </div>
                <button class="btn-icon"><i class="fas fa-bell"></i></button>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <div class="page-header-content">
                    <h1>设置</h1>
                    <p class="page-subtitle">自定义您的网站体验，管理账户和偏好设置</p>
                </div>
            </div>

            <div class="settings-grid">
                <div class="card settings-card">
                    <div class="card-header"><i class="fas fa-palette"></i><h3>外观主题</h3></div>
                    <div class="settings-section">
                        <h4>选择色彩风格</h4>
                        <div class="theme-grid">
                            <div class="theme-option active" data-theme="tech-blue">
                                <div class="theme-preview tech-blue-preview"><div class="preview-bar"></div><div class="preview-circle"></div></div>
                                <div class="theme-info"><span class="theme-name">科技蓝</span><span class="theme-badge default">默认</span></div>
                            </div>
                            <div class="theme-option" data-theme="cyber-purple">
                                <div class="theme-preview cyber-purple-preview"><div class="preview-bar"></div><div class="preview-circle"></div></div>
                                <div class="theme-info"><span class="theme-name">赛博紫</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="settings-section">
                        <h4>界面模式</h4>
                        <div class="mode-selector">
                            <button class="mode-btn active" data-mode="dark"><i class="fas fa-moon"></i><span>深色模式</span></button>
                            <button class="mode-btn" data-mode="light"><i class="fas fa-sun"></i><span>浅色模式</span></button>
                            <button class="mode-btn" data-mode="auto"><i class="fas fa-adjust"></i><span>跟随系统</span></button>
                        </div>
                    </div>
                </div>

                <div class="card settings-card">
                    <div class="card-header"><i class="fas fa-user-circle"></i><h3>账户设置</h3></div>
                    <div class="settings-form">
                        <div class="form-row">
                            <div class="form-group"><label>显示名称</label><input type="text" value="Test User" placeholder="您的名称"></div>
                            <div class="form-group"><label>用户名</label><input type="text" value="@testuser" placeholder="用户名" disabled></div>
                        </div>
                        <div class="form-group"><label>邮箱地址</label><input type="email" value="user@example.com" placeholder="邮箱"></div>
                        <div class="form-group"><label>个人简介</label><textarea rows="3" placeholder="介绍一下自己..."></textarea></div>
                        <div class="form-actions"><button class="btn btn-primary">保存更改</button></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="js/settings.js"></script>
    <script>
        // 动态加载Logo
        document.addEventListener('DOMContentLoaded', function() {
            const logoImg = document.querySelector('.logo-img');
            if (logoImg && window.getFileProxyUrl) {
                logoImg.src = window.getFileProxyUrl('silly/logo/logo.svg');
            }
        });
    </script>
</body>
</html>
