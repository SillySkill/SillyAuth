<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 调试页面</title>
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff88;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .info { color: #4488ff; }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #4488ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #3366dd; }
        pre {
            background: #111;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 400px;
        }
    </style>
</head>
<body>
    <h1>🔍 SillyMD API 调试工具</h1>

    <div class="section">
        <h2>API 配置</h2>
        <p>API 地址: <span id="apiUrl">http://47.96.133.238:8000</span></p>
        <p id="status">状态: 检查中...</p>
        <button onclick="testHealth()">测试健康检查</button>
        <button onclick="testSkills()">测试 Skills 接口</button>
        <button onclick="testStats()">测试统计接口</button>
    </div>

    <div class="section">
        <h2>测试结果</h2>
        <pre id="results">等待测试...</pre>
    </div>

    <div class="section">
        <h2>Skills 数据 (前3条)</h2>
        <pre id="skillsData">等待加载...</pre>
    </div>

    <script>
        const API_BASE = 'http://47.96.133.238:8000';

        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            results.innerHTML = `<span class="${className}">[${timestamp}] ${message}</span>\n` + results.innerHTML;
        }

        async function testHealth() {
            log('开始健康检查...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                log(`健康检查成功: ${JSON.stringify(data, null, 2)}`, 'success');
                document.getElementById('status').innerHTML = '<span class="success">状态: 连接正常 ✅</span>';
            } catch (error) {
                log(`健康检查失败: ${error.message}`, 'error');
                document.getElementById('status').innerHTML = '<span class="error">状态: 连接失败 ❌</span>';
            }
        }

        async function testSkills() {
            log('测试 Skills 接口...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/skills?limit=3`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                log(`Skills 接口成功! 获取到 ${data.length} 条数据`, 'success');
                document.getElementById('skillsData').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                log(`Skills 接口失败: ${error.message}`, 'error');
            }
        }

        async function testStats() {
            log('测试统计接口...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/market/stats`);
                const data = await response.json();
                log(`统计接口成功: ${JSON.stringify(data, null, 2)}`, 'success');
            } catch (error) {
                log(`统计接口失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动测试
        window.addEventListener('load', async () => {
            log('页面加载完成，开始自动测试...', 'info');
            await testHealth();
            await new Promise(r => setTimeout(r, 500));
            await testSkills();
        });

        // 捕获全局错误
        window.addEventListener('error', (event) => {
            log(`全局错误: ${event.message}`, 'error');
            console.error(event);
        });

        // 捕获未处理的 Promise 错误
        window.addEventListener('unhandledrejection', (event) => {
            log(`Promise 错误: ${event.reason}`, 'error');
            console.error(event);
        });
    </script>
    <script src="js/mobile-menu.js"></script>
</body>
</html>
