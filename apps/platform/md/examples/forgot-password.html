<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 挺傻的网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tech-blue.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="grid-pattern"></div>
    </div>

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <img src="silly/logo/logo.svg" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <i class="fas fa-cube" style="display:none;"></i>
                    <span>挺傻的网站</span>
                </a>
                <h1>重置密码</h1>
                <p class="reset-instruction">输入您的邮箱地址，我们将发送密码重置链接给您</p>
            </div>

            <form class="auth-form" id="forgotForm">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required 
                               placeholder="name@example.com">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <span>发送重置链接</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html" class="back-to-login">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回登录</span>
                </a>
            </div>
        </div>

        <div class="auth-decoration">
            <div class="tech-ring"></div>
            <div class="tech-ring ring-2"></div>
            <div class="floating-icons">
                <i class="fas fa-key"></i>
                <i class="fas fa-lock"></i>
                <i class="fas fa-envelope"></i>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/mobile-menu.js"></script>
</body>
</html>
