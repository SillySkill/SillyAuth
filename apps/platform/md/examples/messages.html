<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息 - 挺傻的网站</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tech-blue.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Config.js -->
    <script type="module" src="js/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .messages-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 0;
            height: calc(100vh - 140px);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .conversations-list {
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .conversation-item:hover {
            background: rgba(14, 165, 233, 0.03);
        }

        .conversation-item.active {
            background: rgba(14, 165, 233, 0.08);
            border-left: 3px solid var(--primary-color);
        }

        .conversation-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .unread-badge {
            background: var(--accent);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            flex-shrink: 0;
        }

        .chat-header h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-secondary);
        }

        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-own {
            flex-direction: row-reverse;
        }

        .message-avatar img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-content-wrapper {
            max-width: 70%;
        }

        .message-sender {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .message-own .message-sender {
            text-align: right;
        }

        .message-content {
            background: var(--bg-card);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message-own .message-content {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .message-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .message-own .message-time {
            text-align: right;
        }

        .message-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-card);
            display: none;
            gap: 12px;
        }

        .message-input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--primary-color);
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-send:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
        }

        .new-conversation-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .new-conversation-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 90%;
            max-width: 480px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .messages-container {
                grid-template-columns: 1fr;
            }

            .conversations-list {
                display: flex;
            }

            .chat-area {
                display: none;
            }

            .chat-area.active {
                display: flex;
            }

            .conversations-list.hidden {
                display: none;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo">
                <img src="silly/logo/logo.svg" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <i class="fas fa-cube" style="display:none;"></i>
                <span>挺傻的网站</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>概览</span></a>
            <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i><span>分析</span></a>
            <a href="projects.html" class="nav-item"><i class="fas fa-folder"></i><span>项目</span></a>
            <a href="messages.html" class="nav-item active"><i class="fas fa-envelope"></i><span>消息</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>设置</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-info"><span class="user-name">Test User</span><span class="user-role">Free Plan</span></div>
                <button class="btn-icon" onclick="auth.logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="搜索消息..."></div>
            <div class="top-actions">
                <button class="btn btn-primary" onclick="MessageAPI.showNewConversationModal()"><i class="fas fa-plus"></i> 新消息</button>
                <button class="btn-icon" style="position: relative;">
                    <i class="fas fa-bell"></i>
                    <span data-unread-badge style="display: none; position: absolute; top: -4px; right: -4px; background: var(--accent); color: white; font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 10px; min-width: 16px; text-align: center;"></span>
                </button>
            </div>
        </header>

        <div class="page-content">
            <div class="page-header">
                <h1>消息中心</h1>
                <p>与您的团队成员沟通交流</p>
            </div>

            <div class="messages-container">
                <!-- 对话列表 -->
                <div class="conversations-list" id="conversationsList">
                    <div style="padding: 20px; border-bottom: 1px solid var(--border-color);">
                        <h3 style="font-size: 16px; margin: 0;">对话列表</h3>
                    </div>
                    <div data-conversations-list>
                        <div style="padding: 40px 20px; text-align: center; color: var(--text-muted);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 32px; margin-bottom: 12px;"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>

                <!-- 聊天区域 -->
                <div class="chat-area" id="chatArea" data-chat-area>
                    <!-- 空状态 -->
                    <div class="empty-state" data-empty-state>
                        <i class="fas fa-comments" style="font-size: 64px; margin-bottom: 16px; opacity: 0.5;"></i>
                        <p>选择一个对话开始聊天</p>
                    </div>

                    <!-- 聊天内容 -->
                    <div class="chat-header" id="chatHeader" style="display: none;">
                        <h3 id="chatTitle">对话标题</h3>
                    </div>

                    <div class="messages-wrapper" data-messages-container></div>

                    <div class="message-input-area" data-message-input-area>
                        <div class="message-input-wrapper">
                            <input type="text"
                                   class="message-input"
                                   data-message-input
                                   placeholder="输入消息..."
                                   onkeypress="if(event.key === 'Enter') MessageAPI.sendFromInput()">
                        </div>
                        <button class="btn-send" onclick="MessageAPI.sendFromInput()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 新建对话模态框 -->
    <div class="new-conversation-modal" id="newConversationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建对话</h3>
                <button class="btn-close" onclick="MessageAPI.hideNewConversationModal()">&times;</button>
            </div>
            <form id="newConversationForm" onsubmit="MessageAPI.createNewConversation(event)">
                <div class="form-group">
                    <label>对话类型</label>
                    <select id="conversationType" onchange="MessageAPI.toggleConversationType()">
                        <option value="direct">单聊</option>
                        <option value="group">群聊</option>
                    </select>
                </div>
                <div class="form-group" id="titleGroup" style="display: none;">
                    <label>群组名称</label>
                    <input type="text" id="conversationTitle" placeholder="输入群组名称">
                </div>
                <div class="form-group">
                    <label>参与者 (用逗号分隔用户ID)</label>
                    <input type="text" id="participantIds" placeholder="例如: 1, 2, 3" required>
                </div>
                <div class="form-group">
                    <label>初始消息 (可选)</label>
                    <textarea id="initialMessage" rows="3" placeholder="说点什么..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" onclick="MessageAPI.hideNewConversationModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
