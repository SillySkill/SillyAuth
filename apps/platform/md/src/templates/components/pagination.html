{% set tp = total_pages|default(0) %}
{% if tp > 1 %}
{% set cp = current_page|default(1) %}
<div class="pagination">
    {% if cp > 1 %}
    <a href="?page={{ cp - 1 }}{% if search_query|default('') %}&search={{ search_query }}{% endif %}" class="page-link">&laquo; 上一页</a>
    {% endif %}
    {% for p in range(1, tp + 1) %}
        {% if p == cp %}
        <span class="page-link active">{{ p }}</span>
        {% else %}
        <a href="?page={{ p }}{% if search_query|default('') %}&search={{ search_query }}{% endif %}" class="page-link">{{ p }}</a>
        {% endif %}
    {% endfor %}
    {% if cp < tp %}
    <a href="?page={{ cp + 1 }}{% if search_query|default('') %}&search={{ search_query }}{% endif %}" class="page-link">下一页 &raquo;</a>
    {% endif %}
</div>
{% endif %}
