{% extends "base.html" %}

{% block title %}设置 - 挺傻的{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="/static/css/settings.css">
{% endblock %}

{% block content %}
<div class="page-content">
    <div class="page-header">
        <div class="page-header-content">
            <h1>设置</h1>
            <p class="page-subtitle">自定义您的网站体验，管理账户和偏好设置</p>
        </div>
    </div>

    <div class="settings-grid">
        <!-- 外观主题 -->
        <div class="card settings-card">
            <div class="card-header"><i class="fas fa-palette"></i><h3>外观主题</h3></div>
            <div class="settings-section">
                <h4>选择色彩风格</h4>
                <div class="theme-grid">
                    <div class="theme-option active" data-theme="tech-blue">
                        <div class="theme-preview tech-blue-preview"><div class="preview-bar"></div><div class="preview-circle"></div></div>
                        <div class="theme-info"><span class="theme-name">科技蓝</span><span class="theme-badge default">默认</span></div>
                    </div>
                    <div class="theme-option" data-theme="cyber-purple">
                        <div class="theme-preview cyber-purple-preview"><div class="preview-bar"></div><div class="preview-circle"></div></div>
                        <div class="theme-info"><span class="theme-name">赛博紫</span></div>
                    </div>
                </div>
            </div>
            <div class="settings-section">
                <h4>界面模式</h4>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="dark"><i class="fas fa-moon"></i><span>深色模式</span></button>
                    <button class="mode-btn" data-mode="light"><i class="fas fa-sun"></i><span>浅色模式</span></button>
                    <button class="mode-btn" data-mode="auto"><i class="fas fa-adjust"></i><span>跟随系统</span></button>
                </div>
            </div>
        </div>

        <!-- 账户设置 -->
        <div class="card settings-card">
            <div class="card-header"><i class="fas fa-user-circle"></i><h3>账户设置</h3></div>
            <div class="settings-form">
                <form id="accountSettingsForm" method="post" action="/user/settings/profile">
                    <div class="form-row">
                        <div class="form-group">
                            <label>显示名称</label>
                            <input type="text" name="display_name" value="{{ user.display_name | default('') }}" placeholder="您的名称">
                        </div>
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" name="username" value="{{ user.username | default('') }}" placeholder="用户名" {% if user.username %}disabled{% endif %}>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>邮箱地址</label>
                        <input type="email" name="email" value="{{ user.email | default('') }}" placeholder="邮箱">
                    </div>
                    <div class="form-group">
                        <label>个人简介</label>
                        <textarea name="bio" rows="3" placeholder="介绍一下自己...">{{ user.bio | default('') }}</textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存更改</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 安全设置 -->
        <div class="card settings-card">
            <div class="card-header"><i class="fas fa-shield-alt"></i><h3>安全设置</h3></div>
            <div class="settings-form">
                <form id="securityForm" method="post" action="/user/settings/security">
                    <div class="form-group">
                        <label>当前密码</label>
                        <input type="password" name="current_password" placeholder="输入当前密码" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>新密码</label>
                            <input type="password" name="new_password" placeholder="输入新密码" required minlength="8">
                        </div>
                        <div class="form-group">
                            <label>确认新密码</label>
                            <input type="password" name="confirm_password" placeholder="再次输入新密码" required minlength="8">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">更新密码</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 偏好设置 -->
        <div class="card settings-card">
            <div class="card-header"><i class="fas fa-sliders-h"></i><h3>偏好设置</h3></div>
            <div class="settings-form">
                <form id="preferencesForm" method="post" action="/user/settings/preferences">
                    <div class="form-group">
                        <label>语言</label>
                        <select name="language" class="form-select">
                            <option value="zh-CN" {% if user.language == 'zh-CN' %}selected{% endif %}>中文</option>
                            <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
                            <option value="ja" {% if user.language == 'ja' %}selected{% endif %}>日本語</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>通知偏好</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" name="email_notifications" {% if user.email_notifications %}checked{% endif %}>
                                <span>邮件通知</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="push_notifications" {% if user.push_notifications %}checked{% endif %}>
                                <span>推送通知</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存偏好</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/settings.js"></script>
{% endblock %}
