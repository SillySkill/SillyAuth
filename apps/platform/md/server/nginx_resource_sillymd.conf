server {
    listen 80;
    server_name resource.sillymd.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name resource.sillymd.com;

    root /opt/sillymd/server/uploads;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/resource.sillymd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resource.sillymd.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
